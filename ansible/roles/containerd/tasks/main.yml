---
- name: Install containerd
  ansible.builtin.apt:
    name: "{{ containerd_package_name }}"
    state: present
    update_cache: true

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"

- name: Ensure CNI binary directory exists
  ansible.builtin.file:
    path: "{{ containerd_cni_bin_dir }}"
    state: directory
    mode: "0755"

- name: Ensure CNI config directory exists
  ansible.builtin.file:
    path: "{{ containerd_cni_conf_dir }}"
    state: directory
    mode: "0755"

- name: Generate default containerd config
  ansible.builtin.command: containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config with SystemdCgroup enabled
  ansible.builtin.copy:
    dest: "{{ containerd_config_path }}"
    mode: "0644"
    content: "{{ containerd_default_config.stdout | replace('SystemdCgroup = false', 'SystemdCgroup = true') }}"
  notify: Restart containerd

- name: Configure containerd CNI binary directory
  ansible.builtin.replace:
    path: "{{ containerd_config_path }}"
    regexp: 'bin_dir = ".*"'
    replace: 'bin_dir = "{{ containerd_cni_bin_dir }}"'
  notify: Restart containerd

- name: Configure containerd CNI config directory
  ansible.builtin.replace:
    path: "{{ containerd_config_path }}"
    regexp: 'conf_dir = ".*"'
    replace: 'conf_dir = "{{ containerd_cni_conf_dir }}"'
  notify: Restart containerd

- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true

- name: Configure crictl endpoint
  ansible.builtin.copy:
    dest: /etc/crictl.yaml
    mode: "0644"
    content: |
      runtime-endpoint: unix:///run/containerd/containerd.sock
      image-endpoint: unix:///run/containerd/containerd.sock
      timeout: 10
      debug: false
