---
- name: Gather service facts
  ansible.builtin.service_facts:

- name: Assert supported distribution
  ansible.builtin.assert:
    that:
      - ansible_distribution in preflight_supported_distributions
    fail_msg: "Unsupported OS: {{ ansible_distribution }}. Expected Debian or Ubuntu."

- name: Assert minimum memory
  ansible.builtin.assert:
    that:
      - ansible_memtotal_mb >= preflight_min_memory_mb
    fail_msg: "Not enough memory for Kubernetes: {{ ansible_memtotal_mb }} MB."

- name: Assert minimum CPU count
  ansible.builtin.assert:
    that:
      - ansible_processor_vcpus >= preflight_min_vcpus
    fail_msg: "Not enough vCPUs for Kubernetes: {{ ansible_processor_vcpus }}."

- name: Check if swap is enabled
  ansible.builtin.command: swapon --show --noheadings
  register: preflight_swap
  changed_when: false
  failed_when: false

- name: Warn when swap is currently enabled
  ansible.builtin.debug:
    msg: "Swap is enabled and will be disabled by the common role."
  when: preflight_swap.stdout | length > 0
