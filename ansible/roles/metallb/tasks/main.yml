---
- name: Install MetalLB controller
  ansible.builtin.command: kubectl apply -f {{ metallb_manifest_url }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_install
  changed_when: "'created' in metallb_install.stdout or 'configured' in metallb_install.stdout"
  when: metallb_enabled

- name: Wait for MetalLB namespace
  ansible.builtin.command: kubectl get namespace {{ metallb_namespace }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_namespace_ready
  changed_when: false
  retries: 12
  delay: 5
  until: metallb_namespace_ready.rc == 0
  when: metallb_enabled

- name: Ensure MetalLB memberlist secret exists
  ansible.builtin.shell: |
    set -o pipefail
    if kubectl -n {{ metallb_namespace }} get secret memberlist >/dev/null 2>&1; then
      exit 0
    fi
    kubectl -n {{ metallb_namespace }} create secret generic memberlist \
      --from-literal=secretkey="$(openssl rand -base64 128)"
  args:
    executable: /bin/bash
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_memberlist_secret
  changed_when: "'secret/memberlist created' in metallb_memberlist_secret.stdout"
  when: metallb_enabled

- name: Wait for MetalLB controller
  ansible.builtin.command: kubectl -n {{ metallb_namespace }} rollout status deployment/controller --timeout={{ metallb_wait_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
  when: metallb_enabled

- name: Wait for MetalLB speaker
  ansible.builtin.command: kubectl -n {{ metallb_namespace }} rollout status daemonset/speaker --timeout={{ metallb_wait_timeout }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
  when: metallb_enabled

- name: Render MetalLB IP address pool
  ansible.builtin.template:
    src: ipaddresspool.yml.j2
    dest: /tmp/metallb-ipaddresspool.yml
    mode: "0644"
  when: metallb_enabled

- name: Render MetalLB L2 advertisement
  ansible.builtin.template:
    src: l2advertisement.yml.j2
    dest: /tmp/metallb-l2advertisement.yml
    mode: "0644"
  when: metallb_enabled

- name: Apply MetalLB IP address pool
  ansible.builtin.command: kubectl apply -f /tmp/metallb-ipaddresspool.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_pool_apply
  changed_when: "'created' in metallb_pool_apply.stdout or 'configured' in metallb_pool_apply.stdout"
  when: metallb_enabled

- name: Apply MetalLB L2 advertisement
  ansible.builtin.command: kubectl apply -f /tmp/metallb-l2advertisement.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: metallb_l2_apply
  changed_when: "'created' in metallb_l2_apply.stdout or 'configured' in metallb_l2_apply.stdout"
  when: metallb_enabled
