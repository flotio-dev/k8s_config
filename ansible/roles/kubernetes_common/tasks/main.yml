---
- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Kubernetes apt release key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key"
    dest: /tmp/kubernetes-release.key
    mode: "0644"

- name: Install Kubernetes apt keyring
  ansible.builtin.command:
    cmd: "gpg --dearmor -o {{ kubernetes_apt_keyring }} /tmp/kubernetes-release.key"
    creates: "{{ kubernetes_apt_keyring }}"

- name: Configure Kubernetes apt repository
  ansible.builtin.copy:
    dest: "{{ kubernetes_apt_repo_file }}"
    mode: "0644"
    content: |
      deb [signed-by={{ kubernetes_apt_keyring }}] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /
  register: kubernetes_repo

- name: Update apt cache after Kubernetes repo change
  ansible.builtin.apt:
    update_cache: true
  when: kubernetes_repo.changed

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name: "{{ kubernetes_packages }}"
    state: present
    update_cache: true
  notify: Restart kubelet

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"

- name: Enable kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
