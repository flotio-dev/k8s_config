---
- name: Reset Kubernetes and remove Ansible-installed components
  hosts: all
  become: true
  gather_facts: false
  vars:
    cleanup_containerd_package_name: "{{ containerd_package_name | default('containerd') }}"
    cleanup_helm_package_name: "{{ monitoring_helm_package_name | default('helm') }}"
    cleanup_kubernetes_packages: "{{ kubernetes_packages | default(['kubelet', 'kubeadm', 'kubectl']) }}"
    cleanup_kubernetes_apt_keyring: "{{ kubernetes_apt_keyring | default('/etc/apt/keyrings/kubernetes-apt-keyring.gpg') }}"
    cleanup_kubernetes_apt_repo_file: "{{ kubernetes_apt_repo_file | default('/etc/apt/sources.list.d/kubernetes.list') }}"
    cleanup_monitoring_helm_keyring: "{{ monitoring_helm_keyring | default('/usr/share/keyrings/helm.gpg') }}"
    cleanup_monitoring_helm_repo_file: "{{ monitoring_helm_repo_file | default('/etc/apt/sources.list.d/helm-stable-debian.list') }}"
    cleanup_containerd_config_path: "{{ containerd_config_path | default('/etc/containerd/config.toml') }}"
    cleanup_containerd_cni_bin_dir: "{{ containerd_cni_bin_dir | default('/opt/cni/bin') }}"
    cleanup_containerd_cni_conf_dir: "{{ containerd_cni_conf_dir | default('/etc/cni/net.d') }}"
    cleanup_packages: "{{ cleanup_kubernetes_packages + [cleanup_containerd_package_name, cleanup_helm_package_name] }}"
    cleanup_paths:
      - /etc/kubernetes
      - /etc/containerd
      - /etc/crictl.yaml
      - /var/lib/kubelet
      - /var/lib/etcd
      - /var/lib/cni
      - /var/lib/containerd
      - /var/log/containers
      - /var/log/pods
      - /etc/cni
      - /run/flannel
      - /run/containerd
      - /root/.kube
      - "/home/{{ ansible_user }}/.kube"
      - "{{ cleanup_containerd_config_path }}"
      - "{{ cleanup_containerd_cni_bin_dir }}"
      - "{{ cleanup_containerd_cni_conf_dir }}"
      - "{{ cleanup_kubernetes_apt_keyring }}"
      - "{{ cleanup_kubernetes_apt_repo_file }}"
      - "{{ cleanup_monitoring_helm_keyring }}"
      - "{{ cleanup_monitoring_helm_repo_file }}"
      - /etc/modules-load.d/k8s.conf
      - /etc/sysctl.d/k8s.conf
  tasks:
    - name: Stop kubelet so it cannot recreate static pods
      ansible.builtin.systemd:
        name: kubelet
        state: stopped
        enabled: false
      failed_when: false

    - name: Check if kubeadm is installed
      ansible.builtin.command: which kubeadm
      register: cleanup_kubeadm
      changed_when: false
      failed_when: false

    - name: Reset local kubeadm state without depending on Kubernetes API
      ansible.builtin.command: timeout 120 kubeadm reset -f
      register: cleanup_kubeadm_reset
      changed_when: cleanup_kubeadm_reset.rc == 0
      failed_when: false
      when: cleanup_kubeadm.rc == 0

    - name: Remove Kubernetes containers through CRI while containerd is still available
      ansible.builtin.shell: |
        set +e
        if command -v crictl >/dev/null 2>&1; then
          crictl ps -aq | xargs -r crictl rm -f
          crictl pods -q | xargs -r crictl rmp -f
          crictl rmi --prune
        fi
        if command -v ctr >/dev/null 2>&1; then
          ctr -n k8s.io tasks ls -q | xargs -r -n1 ctr -n k8s.io tasks kill --signal SIGKILL
          ctr -n k8s.io tasks ls -q | xargs -r -n1 ctr -n k8s.io tasks rm --force
          ctr -n k8s.io containers ls -q | xargs -r -n1 ctr -n k8s.io containers rm
          ctr -n k8s.io images ls -q | xargs -r -n1 ctr -n k8s.io images rm
        fi
        exit 0
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Stop containerd after container cleanup
      ansible.builtin.systemd:
        name: containerd
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove stale CNI network interfaces
      ansible.builtin.shell: |
        set +e
        ip link delete cni0 2>/dev/null || true
        ip link delete flannel.1 2>/dev/null || true
        exit 0
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Kill stale Kubernetes and container runtime processes
      ansible.builtin.shell: |
        set +e
        pkill -9 -x kube-apiserver || true
        pkill -9 -x kube-controller-manager || true
        pkill -9 -x kube-scheduler || true
        pkill -9 -x kubelet || true
        pkill -9 -x etcd || true
        pkill -9 -f '[c]ontainerd-shim' || true
        exit 0
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Unhold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop: "{{ cleanup_kubernetes_packages }}"
      failed_when: false

    - name: Remove Kubernetes, containerd and Helm packages
      ansible.builtin.apt:
        name: "{{ cleanup_packages }}"
        state: absent
        purge: true
        autoremove: true
        update_cache: false
      failed_when: false

    - name: Remove Kubernetes and platform configuration files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ cleanup_paths }}"

    - name: Reload sysctl after removing Kubernetes settings
      ansible.builtin.command: sysctl --system
      changed_when: false
      failed_when: false
