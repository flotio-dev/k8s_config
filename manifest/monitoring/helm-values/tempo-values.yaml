fullnameOverride: tempo
replicas: 1

tempo:
  retention: 168h
  reportingEnabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

serviceMonitor:
  enabled: true
  additionalLabels:
    release: monitoring

persistence:
  enabled: true
  size: 20Gi

