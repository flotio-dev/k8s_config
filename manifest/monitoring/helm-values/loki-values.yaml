fullnameOverride: loki
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h
    allow_structured_metadata: true
    volume_enabled: true
  ruler:
    enable_api: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

gateway:
  enabled: true

monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: monitoring
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

test:
  enabled: false
