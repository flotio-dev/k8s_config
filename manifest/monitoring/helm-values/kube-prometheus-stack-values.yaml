fullnameOverride: monitoring

grafana:
  enabled: true
  adminPassword: "CHANGE_ME_OR_USE_EXISTING_SECRET"
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      isDefault: false
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo.monitoring.svc.cluster.local:3200
      isDefault: false
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          tags:
            - key: service.name
              value: service_name
            - key: k8s.namespace.name
              value: namespace
            - key: k8s.pod.name
              value: pod
          filterByTraceID: true
          filterBySpanID: false
        nodeGraph:
          enabled: true
        serviceMap:
          datasourceUid: Prometheus
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.flotio.ovh
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.flotio.ovh
  persistence:
    enabled: true
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false
