apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apm-spanmetrics
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: apm.spanmetrics.recording
      interval: 30s
      rules:
        - record: apm:request_rate:5m
          expr: |
            sum by (service_name) (
              rate(traces_spanmetrics_calls_total[5m])
            )
        - record: apm:error_rate:5m
          expr: |
            sum by (service_name) (
              rate(traces_spanmetrics_calls_total{status_code=~"5..|Error"}[5m])
            )
        - record: apm:error_ratio:5m
          expr: |
            apm:error_rate:5m
            /
            clamp_min(apm:request_rate:5m, 0.001)
        - record: apm:duration_p95:5m
          expr: |
            histogram_quantile(
              0.95,
              sum by (le, service_name) (
                rate(traces_spanmetrics_duration_bucket[5m])
              )
            )

