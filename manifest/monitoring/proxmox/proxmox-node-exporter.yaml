apiVersion: v1
kind: Service
metadata:
  name: proxmox-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: proxmox-node-exporter
spec:
  clusterIP: None
  ports:
    - name: http
      port: 9100
      targetPort: 9100
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: proxmox-node-exporter
subsets:
  - addresses:
      - ip: 192.168.1.16
    ports:
      - name: http
        port: 9100
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-node-exporter
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-node-exporter
  endpoints:
    - port: http
      interval: 30s
      path: /metrics

