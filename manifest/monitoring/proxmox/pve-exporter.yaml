apiVersion: apps/v1
kind: Deployment
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pve-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pve-exporter
    spec:
      containers:
        - name: pve-exporter
          image: prompve/prometheus-pve-exporter:3.5.1
          args:
            - --config.file=/etc/prometheus/pve.yml
          ports:
            - name: http
              containerPort: 9221
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /pve
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: pve-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pve-exporter
spec:
  selector:
    app.kubernetes.io/name: pve-exporter
  ports:
    - name: http
      port: 9221
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pve-exporter
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: pve-exporter
  endpoints:
    - port: http
      interval: 30s
      path: /pve
      params:
        target:
          - https://192.168.1.16:8006
