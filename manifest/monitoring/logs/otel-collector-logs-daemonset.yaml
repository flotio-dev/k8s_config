apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector-logs
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-logs
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-logs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-logs
subjects:
  - kind: ServiceAccount
    name: otel-collector-logs
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-logs-config
  namespace: monitoring
data:
  collector.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/monitoring_otel-collector-logs-*/*/*.log
          - /var/log/pods/*/*/*.gz
          - /var/log/pods/*/*/*.tmp
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          - type: container

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.container.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.cronjob.name
            - k8s.job.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: app.kubernetes.io/name
              key: app.kubernetes.io/name
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection
      resource:
        attributes:
          - key: cluster.name
            value: flotio
            action: upsert
          - key: deployment.environment
            value: infra
            action: upsert
      batch:
        timeout: 5s
        send_batch_size: 4096

    exporters:
      otlp/gateway:
        endpoint: otel-collector-gateway.monitoring.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      extensions: [health_check]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [otlp/gateway]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: otel-collector-logs
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector-logs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector-logs
    spec:
      serviceAccountName: otel-collector-logs
      tolerations:
        - operator: Exists
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.150.1
          args:
            - --config=/conf/collector.yaml
          ports:
            - name: health
              containerPort: 13133
            - name: metrics
              containerPort: 8888
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-logs-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: otel-collector-logs
spec:
  selector:
    app.kubernetes.io/name: otel-collector-logs
  ports:
    - name: metrics
      port: 8888
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector-logs
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector-logs
  endpoints:
    - port: metrics
      interval: 30s
