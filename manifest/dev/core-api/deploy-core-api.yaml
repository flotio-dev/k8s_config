apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: dev
spec:
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: core-api
          image: ghcr.io/flotio-dev/core-api:15.1
          env:
            - name: KUBECTL_API
              value: https://kubernetes.default.svc
            - name: KUBECTL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: core-api-k8s-token
                  key: token

            - name: K8S_NAMESPACE
              value: "android-build"
            - name: OTEL_SERVICE_NAME
              value: core-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-gateway.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=development,service.namespace=flotio

            - name: API_PORT
              value: "8080"
            - name: DATABASE_URL
              value: postgres://flotio:flotio@db-dev:5432/flotio?sslmode=disable

            - name: GITHUB_WEBHOOK_SECRET
              value: supersecret1234!

            - name: GITHUB_APP_ID
              value: "2403932"

            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /secrets/github-app-private-key/key

            - name: FLUTTER_BUILD_IMAGE
              value: ghcr.io/flotio-dev/flutter-build:latest

            - name: AWS_S3_BUCKET
              value: test

            - name: ACCESS_TOKEN_SECRET
              value: daca685d335190f8ed65c6d0dc07142fa75a35d449ba1b774b4e687c0ee10898
            - name: REFRESH_TOKEN_SECRET
              value: 175de9b9b5a2f8a4982ef3c18e344acbf60fdae32d11844e97e7bc54421a1ab1

            - name: REDIS_ADDR
              value: redis-dev:6379
            - name: REDIS_DB
              value: "0"
            - name: REDIS_PASSWORD
              value: ""

            - name: AWS_S3_PREFIX
              value: builds
            - name: AWS_S3_ENDPOINT
              value: https://s3.flotio.ovh/
            - name: AWS_REGION
              value: garage
            - name: AWS_ACCESS_KEY_ID
              value: GK40c43fa7757d37e0be33db20
            - name: AWS_SECRET_ACCESS_KEY
              value: 307a941ac411120a0e8f096fb9e16cbce77734901cc70f6250ac41315d5d7dc8

            - name: ALLOWED_ORIGINS
              value: https://dev.flotio.ovh,https://app-dev.flotio.ovh,https://api-dev.flotio.ovh
          resources:
            limits:
              memory: "256Mi"
              cpu: "1000m"
            requests:
              memory: "128Mi"
              cpu: "500m"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: github-app-private-key
              mountPath: /secrets/github-app-private-key
              readOnly: true
      volumes:
        - name: github-app-private-key
          configMap:
            name: github-app-private-key
